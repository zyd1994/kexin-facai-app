name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 33
        build-tools-version: 33.0.0
        ndk-version: 25.1.8937393
        cmake-version: 3.22.1
        platforms: "android-33"
        addons: "addon-google_apis-google-33"

    - name: Display Android SDK Info
      run: |
        echo "ANDROID_HOME: $ANDROID_HOME"
        echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
        ls -la $ANDROID_HOME/

    - name: Accept Android Licenses
      run: |
        echo "y" | $ANDROID_HOME/tools/bin/sdkmanager --licenses || true
        echo "Attempting to accept Android licenses..."

    - name: Install Cordova
      run: |
        npm install -g cordova

    - name: Install Dependencies
      run: |
        npm install

    - name: Add Android Platform
      run: |
        cordova platform add android

    - name: Build APK
      run: |
        cordova build android

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kexin-facai-apk
        path: |
          platforms/android/app/build/outputs/apk/debug/*.apk
          platforms/android/app/build/outputs/apk/release/*.apk
        retention-days: 7

    - name: Display APK Info
      run: |
        echo "APK构建完成！"
        echo "APK文件列表："
        find platforms/android/app/build/outputs/apk/ -name "*.apk" -type f | while read file; do
          echo "- $(basename "$file") ($(du -h "$file" | cut -f1))"
        done
<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <!-- 金色渐变背景 -->
  <defs>
    <radialGradient id="goldGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="1"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="1"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 圆形背景 -->
  <circle cx="96" cy="96" r="80" fill="url(#goldGradient)" filter="url(#shadow)"/>

  <!-- "财"字 -->
  <text x="96" y="120" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="72" font-weight="bold">财</text>

  <!-- 装饰边框 -->
  <circle cx="96" cy="96" r="85" fill="none" stroke="#FFD700" stroke-width="4" stroke-dasharray="10,5"/>
</svg>